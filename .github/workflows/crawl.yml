name: Crawl London software jobs

on:
  schedule:
    # Twice each weekday (UTC). 07:00 and 13:00 UTC covers UK morning/early
    # afternoon regardless of BST/GMT.
    - cron: "0 7 * * 1-5"
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crawl-data
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/crawl.py --hours 24

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/jobs.json frontend/public/data/meta.json
          git diff --cached --quiet || git commit -m "chore: update crawled jobs data"
          git push
