# Curated list of software product companies with a real London, UK presence.
#
# The crawler renders `careers_url` — each company's OWN public careers page
# — in a headless browser (see browser_crawl.py). If that page's own
# JavaScript calls a known ATS API (Greenhouse/Lever/Ashby/Workable) to
# populate the listing, exactly as it would for a real visitor, we capture
# that response and parse it. We never call the ATS ourselves. If no such
# call is observed, we fall back to best-effort scraping of the rendered
# page (no reliable posted-date in that case — see README).
#
# `ats`/`token` describe what the page is *expected* to be backed by; they're
# used to recognize the right captured network response and (cosmetically)
# to build job IDs. Getting one wrong just means that company always falls
# back to DOM scraping — it doesn't break anything.
#
# Two companies (Stacklok, Deductive AI) have no separate branded careers
# page at all — their own site routes straight to the ATS-hosted board, so
# careers_url points directly at that board page (still rendered in the
# browser, still captured the same way).
#
# When no network call is captured on the initial page, the crawler also
# looks for an on-page link to the company's configured ATS board (a "View
# open roles" button, say) and follows it once before falling back to DOM
# scraping — see browser_crawl.py.
#
# Researched + verified 2026-07-17 (initial 29) and 2026-07-17 (expansion to
# ~144, covering large/established employers, more UK-native scaleups, and
# smaller US/international companies expanding into London). Company sites
# redesign / migrate ATS providers over time — re-verify periodically.
#
# ats: one of "greenhouse" | "lever" | "ashby" | "workable" | "other"
#      ("other" covers Workday, SmartRecruiters, Avature, Eightfold, and
#      fully custom in-house systems — none of these have a parser, so
#      those companies always land in the DOM-fallback/unconfirmed bucket;
#      see the `note` field for what the real backend actually is)
# origin: "UK" (founded/HQ'd in the UK), "US", or "Intl" (neither UK nor US)
#         — informational only, not used by the crawler.

