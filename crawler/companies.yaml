# Curated list of software product companies with a real London, UK presence.
#
# Each entry points at the company's own applicant-tracking-system (ATS) feed —
# the same public JSON feed that powers the "Careers" page on the company's own
# website. This is not third-party scraping of an aggregator; it's reading each
# company's own published job data.
#
# Tokens were identified via web search on 2026-07-17 by matching each
# company's public job-board URL, e.g. https://boards.greenhouse.io/<token>,
# https://jobs.lever.co/<token>, https://jobs.ashbyhq.com/<token>.
# ATS providers and tokens can change over time — re-verify periodically.
#
# ats: one of "greenhouse" | "lever" | "ashby"
# token: the slug in the company's job-board URL

companies:
